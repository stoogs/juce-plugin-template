<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plugin UI</title>
    <style>
        /* Minimal reset — replace with your own styles */
        body { margin: 0; padding: 16px; font-family: sans-serif; background: #1a1a1a; color: #eee; }
        button { padding: 8px 16px; cursor: pointer; }
        #log { margin-top: 12px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

<h2>Plugin Template</h2>

<!-- Test button: triggers a C++ callback to verify bidirectional comms are wired -->
<button id="pingBtn">Send test message to C++</button>
<div id="log">Messages from C++ will appear here.</div>

<script>
// =============================================================================
// JS <-> C++ Bridge (JUCE 8 WebBrowserComponent native integration)
// =============================================================================
//
// SENDING to C++ (JS -> C++):
//   Call sendToPlugin(type, name, value) from anywhere in this page.
//   Uses window.__JUCE__.backend.emitEvent("pluginMessage", { type, name, value })
//   which routes to the withEventListener("pluginMessage", ...) callback in C++.
//
//   Message format — JSON object with three fields:
//   {
//     "type":  string  — message category, e.g. "paramChange", "ping"
//     "name":  string  — parameter ID or action name, e.g. "gain"
//     "value": number|string — the value, e.g. 0.75
//   }
//
//   Example: sendToPlugin("paramChange", "gain", 0.75)
//
// RECEIVING from C++ (C++ -> JS):
//   C++ calls emitEventIfBrowserIsVisible("pluginMessage", var) on the
//   WebBrowserComponent. Register a listener with:
//   window.__JUCE__.backend.addEventListener("pluginMessage", handler)
//
// =============================================================================

/**
 * Send a message to the C++ plugin host.
 * @param {string} type  - Message category (e.g. "paramChange", "ping")
 * @param {string} name  - Parameter ID or action (e.g. "gain")
 * @param {*}      value - Value to send (number, string, or boolean)
 */
function sendToPlugin(type, name, value) {
    if (window.__JUCE__ && window.__JUCE__.backend) {
        // JUCE 8 WebBrowserComponent native bridge
        // emitEvent sends { eventId, payload } via window.__JUCE__.postMessage
        // C++ withEventListener("pluginMessage", ...) receives the payload object
        window.__JUCE__.backend.emitEvent("pluginMessage", { type: type, name: name, value: value });
    } else {
        // Fallback for browser-based development (no C++ host)
        console.log('[sendToPlugin]', JSON.stringify({ type: type, name: name, value: value }));
    }
}

// Listen for messages sent from C++ via emitEventIfBrowserIsVisible("pluginMessage", ...)
// C++ sends a var object; JUCE serialises it and delivers it here as a JS object.
function setupBridgeListeners() {
    if (window.__JUCE__ && window.__JUCE__.backend) {
        window.__JUCE__.backend.addEventListener("pluginMessage", function (msg) {
            try {
                const log = document.getElementById('log');
                log.textContent = 'From C++: type=' + msg.type + ' name=' + msg.name + ' value=' + msg.value;
                console.log('[pluginMessageReceived]', msg);
            } catch (e) {
                console.error('[pluginMessageReceived] error:', e, msg);
            }
        });
    }
}

// Set up listeners once the JUCE backend is available.
// The backend is injected before any page scripts run when native integration is enabled.
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupBridgeListeners);
} else {
    setupBridgeListeners();
}

// Test button: sends a "ping" message to C++ to verify the bridge is working.
document.getElementById('pingBtn').addEventListener('click', function () {
    sendToPlugin('ping', 'test', 1);
});

</script>
</body>
</html>
